# Award recipients, grouped by year (newest first).
#
# To add a new year, copy a block and edit it. Each recipient needs:
#   name   – displayed name (also used as the image alt text)
#   image  – path under img/ (e.g. past-recipients/turco.jpg)
#   label  – award category, e.g. "Junior Parasite" or "Sustained Parasitism"
#   modal  – (optional) id of a detail modal in index.html, e.g. UriBenDavidModal

