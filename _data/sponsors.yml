# Sponsors for the current award year (heading uses award.year from _config.yml).
# Each entry:
#   name        – sponsor name
#   url         – sponsor homepage
#   width       – Bootstrap column class controlling layout (col-sm-6, col-sm-12, ...)
#   logo        – (optional) logo image path under img/
#   twitter     – (optional) twitter/x url
#   description – blurb; may contain inline HTML (e.g. <em>, <a>)

- name: GigaScience
  url: https://gigasciencejournal.com
  width: col-sm-6
  logo: logos/gigascience.png
  twitter: http://twitter.com/GigaScience
  description: >-
    <em>GigaScience</em> aims to revolutionize reproducibility of analyses, data
    dissemination, organization, understanding, and use through open access and
    open data publication of 'big data' studies across the life and biomedical
    sciences.

- name: GigaByte
  url: https://gigabytejournal.com/
  width: col-sm-6
  logo: logos/gigabyte.png
  twitter: http://twitter.com/GigaByteJournal
  description: >-
    <em>GigaByte</em> aims to promote the most rapid exchange of scientific
    information in a formal peer-reviewed publishing platform.

- name: GigaScience Press
  url: https://gigasciencepress.com/
  width: col-sm-12
  description: >-
    <a href="https://academic.oup.com/gigascience"><em>GigaScience</em></a> and
    its new sister journal <a href="https://gigabytejournal.com/"><em>GigaByte</em></a>
    are data-centric journals in the life and biomedical sciences published by
    <a href="https://gigasciencepress.com"><em>GigaScience Press</em></a>. Helping
    to incentivise and support data parasites and symbionts, both journals have
    data curation and hosting support and credit the sharing of the associated
    Research Objects (raw and analysed data, code and workflows, etc) with the
    articles, are open, accessible, and follow best (FAIR) practices.
    <em>GigaScience</em> publishes cutting edge research involving large, complex
    datasets, biological data analyses, and software tools; <em>GigaByte</em> is
    designed to publish rapidly changing research in the form of short Data Release
    and Technical Release articles. These present non-complex data sets, continually
    updated software tools, and changing methods that are well-served by having
    embedded content that bring papers to life and allow readers to directly engage
    with the content.  The editors are currently doing a call for papers for the
    launch of GigaByte.
